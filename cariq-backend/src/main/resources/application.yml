spring:
  application:
    name: cariq-backend
  datasource:
    url: jdbc:h2:mem:cariqdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}

openai:
  api-key: ${OPENAI_API_KEY:***REMOVED***}
  base-url: https://api.openai.com/v1
  model: gpt-4o
  temperature: 0.7

app:
  cors:
    allowed-origins: "*"

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.cariq: INFO
